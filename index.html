<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Build a Large Robot Model (From Scratch) - Interactive Overview</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@300;400;600;700;800;900&display=swap');

    :root {
      --bg: #07090f;
      --s1: #0c1018;
      --s2: #111827;
      --s3: #182030;
      --border: #1e293b;
      --border2: #263348;

      /* Thematic Colors */
      --accent-cyan: #22d3ee;
      --accent-cyan-bg: rgba(34, 211, 238, 0.1);
      --shared: #818cf8;
      /* indigo */
      --shared-bg: rgba(129, 140, 248, 0.1);
      --disc: #4ade80;
      /* green */
      --disc-bg: rgba(74, 222, 128, 0.1);
      --flow: #f97316;
      /* orange */
      --flow-bg: rgba(249, 115, 22, 0.1);
      --rl: #facc15;
      /* yellow */
      --rl-bg: rgba(250, 204, 21, 0.1);
      --reason: #c084fc;
      /* purple */
      --reason-bg: rgba(192, 132, 252, 0.1);
      --deploy: #f43f5e;
      /* rose */
      --deploy-bg: rgba(244, 63, 94, 0.1);

      --text: #e2e8f0;
      --muted: #64748b;
      --muted2: #94a3b8;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'Outfit', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ─── SIDEBAR NAVIGATION ─── */
    .sidebar {
      width: 340px;
      background: var(--s1);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      z-index: 10;
    }

    .sidebar::-webkit-scrollbar {
      width: 6px;
    }

    .sidebar::-webkit-scrollbar-thumb {
      background: var(--border2);
      border-radius: 4px;
    }

    .sidebar-header {
      padding: 24px 20px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: rgba(12, 16, 24, 0.95);
      backdrop-filter: blur(10px);
      z-index: 2;
    }

    .book-eyebrow {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--shared);
      margin-bottom: 8px;
    }

    .book-title {
      font-size: 18px;
      font-weight: 800;
      line-height: 1.2;
    }

    .nav-group {
      padding: 16px 12px;
      border-bottom: 1px dashed var(--border);
    }

    .nav-group-title {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin: 0 8px 10px;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      padding: 10px 12px;
      margin-bottom: 4px;
      border-radius: 8px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.2s;
    }

    .nav-item:hover {
      background: var(--s2);
    }

    .nav-item.active {
      background: var(--s2);
      border-color: var(--border2);
    }

    /* Active colors by part */
    .nav-item.active[data-part="1"] {
      border-left: 3px solid var(--accent-cyan);
    }

    .nav-item.active[data-part="2"] {
      border-left: 3px solid var(--shared);
    }

    .nav-item.active[data-part="3"] {
      border-left: 3px solid var(--rl);
    }

    .nav-item.active[data-part="4"] {
      border-left: 3px solid var(--reason);
    }

    .nav-item.active[data-part="5"] {
      border-left: 3px solid var(--deploy);
    }

    .nav-ch {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted2);
      margin-bottom: 4px;
    }

    .nav-title {
      font-size: 13px;
      font-weight: 600;
    }

    .nav-item.active .nav-title {
      color: #fff;
    }

    /* ─── MAIN CONTENT AREA ─── */
    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: 60px 40px;
      position: relative;
    }

    .page-container {
      max-width: 800px;
      margin: 0 auto;
      animation: fadeUp 0.3s ease both;
      padding-bottom: 60px;
    }

    /* ─── REUSABLE UI COMPONENTS ─── */
    .sec-label {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 20px;
      display: inline-block;
      margin-bottom: 16px;
    }

    h2 {
      font-size: 32px;
      font-weight: 900;
      line-height: 1.2;
      margin-bottom: 12px;
    }

    .ch-desc {
      font-size: 15px;
      color: var(--muted2);
      line-height: 1.6;
      margin-bottom: 24px;
    }

    /* Outline Component */
    .outline-box {
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 32px;
    }

    .outline-title {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 8px;
    }

    .outline-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .outline-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .outline-num {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 700;
      width: 32px;
      flex-shrink: 0;
      padding-top: 2px;
    }

    .outline-text {
      font-size: 14px;
      color: var(--text);
      line-height: 1.4;
    }

    .comp-box {
      background: var(--s1);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 16px;
      position: relative;
    }

    .cb-tag {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .cb-name {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .cb-desc {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted2);
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .io-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .io-line {
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }

    .io-pill {
      font-family: var(--mono);
      font-size: 8px;
      padding: 3px 6px;
      border-radius: 4px;
      flex-shrink: 0;
      letter-spacing: 0.5px;
    }

    .io-text {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted2);
      line-height: 1.5;
    }

    .ip-in {
      background: rgba(100, 116, 139, 0.2);
      color: var(--muted2);
      border: 1px solid var(--border2);
    }

    .ip-out {
      background: rgba(129, 140, 248, 0.1);
      color: var(--shared);
      border: 1px solid rgba(129, 140, 248, 0.3);
    }

    .mini-arr {
      text-align: center;
      padding: 4px 0;
      font-size: 14px;
      color: var(--muted);
    }

    .sbs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 24px;
    }

    .ch-card {
      border-radius: 16px;
      border: 1px solid var(--border);
      overflow: hidden;
      background: var(--s1);
      position: relative;
    }

    .ch-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--border2);
    }

    .ch-hdr {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }

    .ch-body {
      padding: 20px;
    }

    /* Spine Logic */
    .spine-flow {
      display: flex;
      align-items: stretch;
      gap: 0;
      flex-wrap: wrap;
    }

    .spine-node {
      background: var(--s2);
      border: 1px solid var(--border2);
      border-radius: 10px;
      padding: 12px;
      text-align: center;
      flex: 1;
      min-width: 120px;
      position: relative;
    }

    .sarr {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 30px;
    }

    .sarr::after {
      content: '▶';
      font-size: 10px;
      color: var(--muted);
    }

    /* Pipeline Box specific styles */
    .pipeline-box {
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 12px;
      text-align: center;
      background: rgba(255, 255, 255, 0.02);
    }

    .pipeline-arrow {
      text-align: center;
      color: var(--muted2);
      font-size: 12px;
      margin: 8px 0;
    }

    /* Visual Components (Probability Bars, Field Viz, Grids) */
    .prob-bars {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 48px;
      margin: 12px 0 8px;
      border-bottom: 1px solid var(--border2);
      padding-bottom: 2px;
    }

    .pb {
      flex: 1;
      border-radius: 2px 2px 0 0;
      min-height: 2px;
    }

    .field-viz {
      height: 80px;
      background: var(--s2);
      border-radius: 6px;
      margin: 12px 0;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .field-svg {
      width: 100%;
      height: 100%;
    }

    .tensor-box {
      background: var(--s2);
      border: 1px dashed var(--border2);
      padding: 10px;
      border-radius: 8px;
      font-family: var(--mono);
      font-size: 11px;
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      align-items: center;
    }

    .tensor-dim {
      color: var(--accent-cyan);
      font-weight: 700;
      background: var(--accent-cyan-bg);
      padding: 2px 6px;
      border-radius: 4px;
    }

    .token-row {
      display: flex;
      gap: 4px;
      margin-top: 12px;
      overflow-x: hidden;
    }

    .token {
      padding: 6px 10px;
      border-radius: 6px;
      font-family: var(--mono);
      font-size: 10px;
      background: var(--s2);
      border: 1px solid var(--border2);
      flex-shrink: 0;
    }

    .token.img {
      border-color: rgba(34, 211, 238, 0.4);
      color: var(--accent-cyan);
    }

    .token.txt {
      border-color: rgba(129, 140, 248, 0.4);
      color: var(--shared);
    }

    .token.act {
      border-color: rgba(74, 222, 128, 0.4);
      color: var(--disc);
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

    function initSidebar() {
      const container = document.getElementById('nav-container');
      let firstId = null;

      bookData.forEach(part => {
        // Group Header
        const groupDiv = document.createElement('div');
        groupDiv.className = 'nav-group';

        const titleDiv = document.createElement('div');
        titleDiv.className = 'nav-group-title';
        titleDiv.innerText = `Part ${part.part}: ${part.partTitle}`;
        groupDiv.appendChild(titleDiv);

        // Chapters
        part.chapters.forEach(ch => {
          if (!firstId) firstId = ch.id;

          const itemDiv = document.createElement('div');
          itemDiv.className = 'nav-item';
          itemDiv.id = `nav-${ch.id}`;
          itemDiv.setAttribute('data-part', part.part);
          itemDiv.onclick = () => loadChapter(ch.id);

          const chNum = document.createElement('div');
          chNum.className = 'nav-ch';
          chNum.innerText = ch.num;

          const chTitle = document.createElement('div');
          chTitle.className = 'nav-title';
          chTitle.innerText = ch.title;

          itemDiv.appendChild(chNum);
          itemDiv.appendChild(chTitle);
          groupDiv.appendChild(itemDiv);
        });

        container.appendChild(groupDiv);
      });

      // Load first chapter initially
      if (firstId) loadChapter(firstId);
    }

    function loadChapter(chapterId) {
      // Update active state in sidebar
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      document.getElementById(`nav-${chapterId}`).classList.add('active');

      // Find chapter data
      let chData = null;
      for (const part of bookData) {
        const found = part.chapters.find(c => c.id === chapterId);
        if (found) { chData = found; break; }
      }

      if (!chData) return;

      // Render main content
      const main = document.getElementById('main-content');
      main.innerHTML = `
    <div class="page-container">
      ${chData.content}
    </div>
  `;
    }

    // Initialize on load
    window.onload = initSidebar;
  </script>
